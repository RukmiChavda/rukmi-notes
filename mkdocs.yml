site_name: Rukmi's VLSI Notes

theme:
  name: material

nav:
  - Home: index.md

  - Inputs:
      - Liberty File (.lib): inputs/lib.md

  - VIM:
    - Why vim?: vim/introduction.md
    - Installation : vim/installation.md
    - Basic editing: vim/basic-editing.md
    - Fast editing: vim/fast-editing.md
    - Cut/Copy/Paste: vim/cut-copy-paste.md
    - Multiple files: vim/handling-multiple-files.md
    - Search and Replace: vim/search-replace.md
    - Visual mode: vim/visual-mode.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format